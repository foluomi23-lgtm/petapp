<!DOCTYPE html><html lang="zh"><head><title>AI问诊</title><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Noto Sans SC",sans-serif;background:#f5f5f8;color:#1a1a2e;max-width:390px;margin:0 auto;min-height:100vh;position:relative;}
:root{--purple:#7B5EA7;--purple-light:#9B7ED4;--purple-bg:#EDE8F5;--purple-pale:#F3EFFE;--green:#7CC67E;--orange:#FF9500;--red:#FF3B30;--gray:#8E8E93;--gray-light:#F2F2F7;--white:#FFFFFF;}
.status-bar{height:44px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;font-size:15px;font-weight:600;}
.page{padding-bottom:80px;}
.back-btn{background:none;border:none;font-size:20px;color:#1a1a2e;cursor:pointer;padding:8px;}
.tab-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:390px;background:#fff;border-top:1px solid #e5e5ea;display:flex;justify-content:space-around;padding:8px 0 20px;z-index:100;}
.tab-item{display:flex;flex-direction:column;align-items:center;gap:3px;text-decoration:none;color:#8E8E93;font-size:10px;background:none;border:none;cursor:pointer;}
.tab-item.active{color:var(--purple);}
.tab-icon{font-size:22px;}
.card{background:#fff;border-radius:16px;padding:16px;margin-bottom:12px;}
.purple-btn{background:var(--purple);color:#fff;border:none;border-radius:24px;padding:12px 24px;font-size:15px;font-weight:500;cursor:pointer;width:100%;}
.purple-btn-sm{background:var(--purple);color:#fff;border:none;border-radius:20px;padding:8px 16px;font-size:13px;font-weight:500;cursor:pointer;}
.tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500;}
.tag-purple{background:var(--purple-bg);color:var(--purple);}
.tag-orange{background:#FFF3E0;color:#FF9500;}
.tag-green{background:#E8F5E9;color:#4CAF50;}
.tag-gray{background:#F2F2F7;color:#8E8E93;}
.section-title{font-size:16px;font-weight:600;margin-bottom:12px;}
.divider{height:1px;background:#F2F2F7;margin:12px 0;}
input{width:100%;padding:10px 16px;border:1px solid #e5e5ea;border-radius:12px;font-size:14px;font-family:inherit;outline:none;background:#F9F9F9;}
input:focus{border-color:var(--purple);}
.avatar{border-radius:50%;object-fit:cover;}
</style>
<style>.chat-bubble{max-width:75%;padding:12px 16px;border-radius:18px;font-size:14px;line-height:1.6;}
.bubble-left{background:#fff;border-radius:4px 18px 18px 18px;}
.bubble-right{background:var(--purple);color:#fff;border-radius:18px 4px 18px 18px;margin-left:auto;}
.chat-row{display:flex;align-items:flex-end;gap:8px;margin-bottom:16px;}
.chat-row.right{flex-direction:row-reverse;}</style>
</head>
<body>
<div class="status-bar"><span>9:41</span><span>📶 🔋</span></div>
<div style="display:flex;justify-content:space-between;align-items:center;padding:0 16px 12px;">
  <button class="back-btn">‹</button>
  <div style="display:flex;flex-direction:column;align-items:center;">
    <div style="width:40px;height:40px;background:var(--purple-bg);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;">🤖</div>
    <span style="font-size:12px;color:var(--gray);margin-top:2px;">16:24</span>
  </div>
  <button style="background:none;border:none;font-size:20px;cursor:pointer;">↻</button>
</div>
<div style="padding:0 16px;padding-bottom:100px;">
  <!-- AI message -->
  <div class="chat-row">
    <div class="chat-bubble bubble-left">
      <div style="font-size:15px;font-weight:500;margin-bottom:8px;">有什么可以帮助您的</div>
      <div style="font-size:13px;color:var(--gray);margin-bottom:12px;">尝试发送宠物档案，分析更精准</div>
      <div style="background:var(--purple-pale);border-radius:12px;padding:12px;display:flex;align-items:center;gap:10px;">
        <img src="https://images.unsplash.com/photo-1587300003388-59208cc962cb?w=80" style="width:44px;height:44px;border-radius:50%;object-fit:cover;"/>
        <div style="flex:1;"><div style="font-size:14px;font-weight:600;">毛毛</div><div style="font-size:12px;color:var(--gray);">1岁3个月 | 妹妹 | 泰迪</div></div>
        <button style="background:none;border:none;color:var(--purple);font-size:13px;cursor:pointer;">发送档案</button>
      </div>
    </div>
  </div>
  <!-- User message -->
  <div class="chat-row right">
    <div class="chat-bubble bubble-right">狗狗不爱吃饭怎么回事</div>
    <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=80" style="width:32px;height:32px;border-radius:50%;object-fit:cover;"/>
  </div>
  <!-- AI reply -->
  <div class="chat-row">
    <div class="chat-bubble bubble-left">
      <div style="font-size:12px;color:var(--gray);margin-bottom:8px;">引用43篇数据作为参数</div>
      <p style="font-size:14px;line-height:1.7;">狗狗不爱吃饭可能有多种原因，包括消化系统不适、口腔问题、应激反应、环境变化或潜在疾病等。中华田园犬一般食欲较好，如果持续拒食，需关注是否伴有呕吐、腹泻、精神状态变化等症状。</p>
      <p style="font-size:14px;margin-top:8px;">结合宠物资料，请回答以下问题以便准确分析病因：</p>
      <button class="purple-btn" style="margin-top:12px;" onclick="window.location.href='expert-consult.html'">去回答</button>
    </div>
  </div>
</div>
<!-- Input bar -->
<div style="position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:390px;background:#fff;border-top:1px solid #eee;padding:12px 16px 28px;display:flex;gap:10px;align-items:center;">
  <button style="background:none;border:none;font-size:20px;cursor:pointer;">🎤</button>
  <input placeholder="宠物遇到的问题" style="flex:1;"/>
  <button style="background:none;border:none;font-size:20px;cursor:pointer;">🐱</button>
  <button style="background:none;border:none;font-size:20px;cursor:pointer;">➕</button>
</div>
<script src="nav.js"></script>
</body></html>
